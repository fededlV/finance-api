name = "finance-api"
main = "src/index.ts"
compatibility_date = "2026-04-19"

[[d1_databases]]
binding = "DB"
database_name = "misfinanzas-db"
database_id = "REPLACE_WITH_PROD_DB_ID"
preview_database_id = "REPLACE_WITH_PROD_DB_ID"

[env.preview]
name = "finance-api-preview"

[[env.preview.d1_databases]]
binding = "DB"
database_name = "misfinanzas-db-preview"
database_id = "REPLACE_WITH_PREVIEW_DB_ID"
preview_database_id = "REPLACE_WITH_PREVIEW_DB_ID"

[env.local]
name = "finance-api-local"

[[env.local.d1_databases]]
binding = "DB"
database_name = "misfinanzas-db-local"
database_id = "REPLACE_WITH_LOCAL_DB_ID"
preview_database_id = "REPLACE_WITH_LOCAL_DB_ID"
